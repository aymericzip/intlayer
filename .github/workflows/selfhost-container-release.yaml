name: 🐳 Self-host Container

# Builds the all-in-one self-hosting image (app + backend + mongo + redis + minio)
# and pushes it to GHCR and Docker Hub. Manual only — triggered from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (in addition to "latest")'
        required: false
        default: ''
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        default: 'linux/amd64'

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  # GHCR repo follows the GitHub owner; Docker Hub repo follows the secret namespace.
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/intlayer-selfhost
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/intlayer-selfhost

jobs:
  build-and-push:
    # Prevents the workflow from running on forks
    if: ${{ github.repository_owner == 'aymericzip' }}

    name: 🐳 Build & push all-in-one image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🧰 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Compute tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            type=sha,format=short

      - name: 🏗️ Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/selfhost/Dockerfile
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
