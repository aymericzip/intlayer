name: 🐳 Self-host Container

# Builds the all-in-one self-hosting image (app + backend + redis + minio, plus a
# bundled Chromium for screenshots) and pushes it to GHCR and Docker Hub. Manual
# only — triggered from the Actions tab.
#
# NOTE: MongoDB is NOT bundled for use — the backend connects to an external
# MongoDB Atlas cluster via DB_ID / DB_MDP / DB_CLUSTER at runtime. The browser
# facing VITE_* URLs are inlined at build time and left at their localhost defaults
# (see docker/selfhost/Dockerfile), so the published image is reached on
# http://localhost:3000. See docs/docs/en/self_hosting.md for the full flow.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (in addition to "latest")'
        required: false
        default: ''
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        # amd64 covers Intel Macs, Windows (Docker Desktop/WSL2) and most Linux;
        # arm64 covers Apple Silicon Macs and Windows-on-ARM.
        default: 'linux/amd64,linux/arm64'

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  # GHCR repo follows the GitHub owner. The Docker Hub repo (when configured) is
  # derived from DOCKERHUB_USERNAME in the "Resolve target registries" step.
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/intlayer-selfhost

jobs:
  build-and-push:
    # Prevents the workflow from running on forks
    if: ${{ github.repository_owner == 'aymericzip' }}

    name: 🐳 Build & push all-in-one image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🧰 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub is optional: only push there when both secrets are configured.
      # GHCR always works via the built-in GITHUB_TOKEN, so the job never fails
      # just because Docker Hub credentials are absent.
      - name: 🔎 Resolve target registries
        id: registries
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          images="${GHCR_IMAGE}"
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "dockerhub=true" >> "$GITHUB_OUTPUT"
            images="${images}"$'\n'"${DOCKERHUB_USERNAME}/intlayer-selfhost"
          else
            echo "dockerhub=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN not set — pushing to GHCR only."
          fi
          {
            echo "images<<EOF"
            echo "$images"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Log in to Docker Hub
        if: steps.registries.outputs.dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Compute tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registries.outputs.images }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            type=sha,format=short

      - name: 🏗️ Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/selfhost/Dockerfile
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
